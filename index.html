<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深度学习期末复习 · 完整术语指南</title>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f5f6fa;
  --sidebar: #1e2a3a;
  --sidebar-hover: #2a3a4e;
  --sidebar-active: #3a5a8a;
  --accent: #4a90d9;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --card: #fff;
  --border: #e8ecf1;
  --tag-bg: #eef3fa;
  --good: #27ae60;
  --bad: #e74c3c;
  --warn: #f39c12;
  --code-bg: #f8f9fb;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
.sidebar {
  width:300px; min-width:300px; background:var(--sidebar); color:#fff; overflow-y:auto; height:100vh; position:sticky; top:0;
  display:flex; flex-direction:column;
}
.sidebar-header { padding:18px 16px 12px; border-bottom:1px solid rgba(255,255,255,0.08); }
.sidebar-header h1 { font-size:18px; font-weight:700; }
.sidebar-header p { font-size:11px; color:rgba(255,255,255,0.45); margin-top:3px; }
.search-box { padding:8px 12px; }
.search-box input {
  width:100%; padding:7px 10px; border-radius:6px; border:none; background:rgba(255,255,255,0.1); color:#fff; font-size:12px; outline:none;
}
.search-box input::placeholder { color:rgba(255,255,255,0.3); }
.search-box input:focus { background:rgba(255,255,255,0.18); }
.cat-list { flex:1; overflow-y:auto; padding:2px 0 20px; }
.cat-item { border-bottom:1px solid rgba(255,255,255,0.04); }
.cat-header {
  display:flex; align-items:center; justify-content:space-between; padding:8px 14px; cursor:pointer; font-size:12.5px; font-weight:600; transition:all 0.15s; user-select:none; color:rgba(255,255,255,0.9);
}
.cat-header:hover { background:var(--sidebar-hover); }
.cat-header .arrow { display:inline-block; font-size:9px; transition:transform 0.2s; color:rgba(255,255,255,0.3); margin-right:4px; }
.cat-header .arrow.open { transform:rotate(90deg); }
.cat-header .count { font-size:10px; color:rgba(255,255,255,0.25); font-weight:400; }
.term-list { display:none; }
.term-list.open { display:block; }
.term-item {
  padding:5px 14px 5px 28px; cursor:pointer; font-size:12px; color:rgba(255,255,255,0.55); transition:all 0.12s; border-left:2px solid transparent;
}
.term-item:hover { color:#fff; background:var(--sidebar-hover); }
.term-item.active { color:#fff; background:var(--sidebar-active); border-left-color:var(--accent); }
.main { flex:1; overflow-y:auto; height:100vh; padding:0; }
.main-header {
  background:var(--card); padding:20px 30px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
}
.main-header h2 { font-size:22px; font-weight:700; }
.main-header .breadcrumb { font-size:12px; color:var(--text-light); margin-top:3px; }
.content { padding:24px 30px 50px; max-width:900px; }
.welcome { text-align:center; padding:50px 20px; }
.welcome h2 { font-size:26px; margin-bottom:10px; }
.welcome p { color:var(--text-light); max-width:480px; margin:0 auto 16px; line-height:1.7; font-size:14px; }
.welcome .stats { display:flex; gap:24px; justify-content:center; margin-top:24px; flex-wrap:wrap; }
.welcome .stat-item { text-align:center; min-width:80px; }
.welcome .stat-num { font-size:28px; font-weight:700; color:var(--accent); }
.welcome .stat-label { font-size:12px; color:var(--text-light); margin-top:2px; }
.term-detail { display:none; animation:fadeIn 0.25s ease; }
.term-detail.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.detail-title { font-size:22px; font-weight:700; margin-bottom:4px; }
.detail-cat { font-size:12px; color:var(--accent); font-weight:600; margin-bottom:16px; }
.detail-section { margin-bottom:16px; }
.detail-section h4 { font-size:14px; font-weight:600; margin-bottom:6px; color:var(--text); display:flex; align-items:center; gap:6px; }
.detail-section h4 .icon { font-size:15px; }
.detail-section p, .detail-section .text { font-size:13.5px; line-height:1.7; color:#444; }
.text { font-size:13.5px; line-height:1.7; color:#444; }
.formula-box {
  background:var(--code-bg); border:1px solid var(--border); border-radius:8px; padding:14px 18px; margin:6px 0; text-align:center; overflow-x:auto;
}
.example-box { background:#f0f7ff; border-left:3px solid var(--accent); border-radius:6px; padding:10px 14px; margin:6px 0; }
.example-box p { margin:0; font-size:13px; line-height:1.65; }
.pros-cons { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:6px 0; }
@media(max-width:700px){ .pros-cons { grid-template-columns:1fr; } }
.pros-box { background:#e8f8f0; border-radius:8px; padding:10px 14px; }
.pros-box h5 { color:var(--good); margin-bottom:4px; font-size:12.5px; }
.pros-box .item { font-size:12.5px; line-height:1.6; padding:1px 0; }
.cons-box { background:#fde8e8; border-radius:8px; padding:10px 14px; }
.cons-box h5 { color:var(--bad); margin-bottom:4px; font-size:12.5px; }
.cons-box .item { font-size:12.5px; line-height:1.6; padding:1px 0; }
.when-box { background:#fef6e6; border-left:3px solid var(--warn); border-radius:6px; padding:10px 14px; margin:6px 0; }
.when-box p { font-size:13px; margin:0; }
.table-box { overflow-x:auto; margin:6px 0; }
.table-box table { width:100%; border-collapse:collapse; font-size:12.5px; }
.table-box th, .table-box td { border:1px solid var(--border); padding:6px 10px; text-align:left; }
.table-box th { background:var(--tag-bg); font-weight:600; }
.table-box tr:nth-child(even) { background:var(--code-bg); }
mjx-container { display:inline-block !important; margin:3px 0; }
code { background:var(--code-bg); padding:1px 5px; border-radius:3px; font-size:12px; font-family:"SF Mono","Fira Code",monospace; }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>🧠 深度学习·期末复习</h1>
    <p>知识体系 · 点击即查</p>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索术语..." oninput="filterTerms()">
  </div>
  <div class="cat-list" id="catList"></div>
</div>

<div class="main">
  <div class="main-header">
    <h2 id="detailTitle">欢迎使用复习指南</h2>
    <div class="breadcrumb" id="breadcrumb"> 从左侧目录选择一个术语查看详情</div>
  </div>
  <div class="content" id="contentArea">
    <div class="welcome" id="welcome">
      <h2>深度学习 · 期末复习指南</h2>
      <p>基于全部课程专栏和查漏补缺整理</p>
      <p style="font-size:12px;color:var(--text-light);">每个术语包含：公式 · 通俗例子 · 优缺点 · 适用场景</p>
      <div class="stats">
        <div class="stat-item"><div class="stat-num">20</div><div class="stat-label">知识大类</div></div>
        <div class="stat-item"><div class="stat-num">130+</div><div class="stat-label">核心术语</div></div>
      </div>
    </div>
    <div id="detailContainer"></div>
  </div>
</div>

<script>
var D = [
  {n:'一、神经网络基础', i:'🔬', ts:[
    {id:'mcp',nm:'MCP模型 (1943)',
     f:'$$y = f\\left(\\sum_{i=1}^n w_i x_i + b\\right)$$',
     e:'好比一个开关：多个输入信号（树突接收），每个信号有不同权重（突触强度），加起来超过阈值就开灯（激活）。比如判断是否下雨：湿度权重0.6+乌云权重0.4\u22650.5\u2192下雨。',
     p:['最早提出神经元的数学模型，概念奠基','结构清晰，可解释性强'],
     c:['权重手工设定，不能学习','只能解决线性可分问题'],
     w:'理解神经网络起源和生物对应关系时，考试常问MCP\u2192感知机的发展脉络。'},
    {id:'perc',nm:'单层感知机 (1957)',
     f:'$$a = \\sigma(\\sum w_i x_i + b)$$  学习规则：预测错误时调整权重',
     e:'判断一封邮件是否为垃圾邮件。预测错了就调权重\u2014\u2014把垃圾邮件判成了正常邮件，就增大相关关键词的权重。能学AND和OR，但学不了XOR（线性不可分）。',
     p:['权重可从数据中学习','简单直观，适合入门理解'],
     c:['只能解决线性可分问题（XOR都搞不定）','单层网络表达能力有限'],
     w:'理解神经网络为什么需要多层。感知机的局限\u2192多层感知机的必要性。'},
    {id:'log',nm:'逻辑斯蒂回归',
     f:'$$y = \\frac{1}{1+e^{-z}}, \\quad z = w^T x$$',
     e:'判断肿瘤良恶性。输入特征（大小、边界是否规则等），输出0.85表示85%概率为恶性。不是输出是/否，而是输出概率，让你自己做决策。',
     p:['输出可解释为概率','凸函数有全局最优解','任意阶可导'],
     c:['决策边界天生是线性的','对特征间复杂交互建模能力弱'],

    {id:'sfmx',nm:'Softmax回归',

     e:'给一张猫图，模型算出三类分数：[4.3, 1.2, -0.5]。Softmax后变成[0.95, 0.04, 0.01]\u2014\u2014猫95%概率，总和=1。梯度极简：\u2202L/\u2202z_i = \u0177_i - y_i',
     p:['输出归一化为概率分布','配合交叉熵梯度极简'],
     c:['指数运算在类别极多时计算量大','对异常值敏感'],
     w:'多分类问题的输出层标配，配合交叉熵使用。'},
    {id:'ls',nm:'最小二乘 (LS)',
     f:'$$\\min_w \\frac12\\|y-Xw\\|_2^2, \\quad w^* = (X^T X)^{-1}X^T y$$',
     e:'预测房价：房屋面积\u2192房价。找一条直线y=wx+b，让所有点到直线的垂直距离平方和最小。',
     p:['有闭合解析解，直接算不用迭代','计算快，可解释性强'],
     c:['假设线性关系','需要X\u1d39X满秩','对异常值极度敏感'],
     w:'特征和标签关系大致线性、变量数<样本数、需要可解释性的场景。'},
    {id:'ridge',nm:'岭回归 (RR / Ridge)',
     f:'$$\\min_w \\frac12\\|y-Xw\\|_2^2 + \\lambda\\|w\\|_2^2, \\quad w^* = (X^T X + \\lambda I)^{-1}X^T y$$',
     e:'只有50个样本但有200个特征，最小二乘直接不可解。岭回归加\u03bbI后保证可逆，同时让权重变小防止过拟合。',

     c:['需要调\u03bb','所有权重都不为0，无特征选择能力'],
     w:'高维小样本、特征多重共线性、最小二乘过拟合时。'}
  ]},
  {n:'二、卷积神经网络(CNN)', i:'\uD83E\uDDE9', ts:[
    {id:'conv',nm:'卷积层 (Conv Layer)',
     f:'输出: $$W_2 = \\frac{W_1+2P-K}{S}+1$$ 参数: $$(K^2C_{in}+1)C_{out}$$',
     e:'用小手电（卷积核=3\u00d73）在全图滑动扫描，每照到一个区域就把亮度的加权和记下来。多个小手电（多个滤波器）各抓不同特征：一个抓边缘，一个抓纹理。',
     p:['参数量远少于全连接（权值共享+局部连接）','平移不变性，对位置不敏感'],
     c:['超参数多（K,S,P,N）需要调','感受野有限，大物体需要深层'],
     w:'任何图像/空间数据的特征提取（图像分类、检测、分割）'},
    {id:'pool',nm:'池化层 (Pooling Layer)',
     f:'$$W_2 = \\frac{W_1-K}{S}+1$$  参数量 = 0',
     e:'最大池化：每2\u00d72区域只保留最亮的一个像素。平均池化：取四个像素的平均值。相当于把一张高清图缩小成缩略图。',
     p:['参数量为0，免费下采样','增大感受野，减少计算量'],
     c:['丢失位置信息','最大池化丢掉了很多信息'],
     w:'CNN中穿插在卷积层之间做下采样。'},

     p:['可以拟合任意复杂决策边界','结构简单'],
     c:['参数最多（常占总参数80%+）','容易过拟合'],
     w:'CNN末端做分类决策。'},

     f:'文本\u2192Word Embedding\u21921D卷积\u21921D全局池化\u2192全连接\u2192分类',
     e:'把文本当一维图像。句子\u201cI love deep learning\u201d\u2192词嵌入矩阵5\u00d7300，用1D卷积核size=2抓bigram(\u201cI love\u201d)，size=3抓trigram(\u201cI love deep\u201d)，池化后全连接分类。',

     w:'短文本分类（情感分类、垃圾邮件识别）效果很好。长序列需要LSTM/Transformer。'},

     e:'3\u00d73空洞卷积d=2：核中间打洞，实际覆盖5\u00d75区域，但参数还是9个。不花钱就扩大感受野。像戴着望远镜看近处\u2014\u2014看得远了但没多花力气。',
     p:['不增参数扩大感受野','不丢失分辨率'],
     c:['位置信息稀疏（中间像素全跳过了）','可能产生网格效应'],
     w:'语义分割（保持分辨率同时扩大感受野）、ASPP模块、WaveNet。'}
  ]},
  {n:'三、经典CNN架构', i:'\uD83C\uDFD7\uFE0F', ts:[
    {id:'lenet',nm:'LeNet-5 (1998)',
     f:'C1(5\u00d75\u00d76)\u2192S2(Pool2)\u2192C3(5\u00d75\u00d716)\u2192S4(Pool2)\u2192C5(5\u00d75\u00d7120)\u2192F6(84)\u2192Out(10)  ~6万参数',
     e:'最早的手写数字识别网络。具体参数：C1层156个参数，S2层0个参数，C3层2416个参数，F6层10164个参数。全连接层是参数大户。',
     p:['CNN的开山之作','结构简洁明快'],
     c:['只有6万参数，表达能力有限','没有ReLU和Dropout'],

    {id:'alex',nm:'AlexNet (2012)',
     f:'5Conv+3Pooling+3FC, 60M参数, Top-5 error 16% (第二名26%)',
     e:'2012年ImageNet冠军，把深度学习带火的革命性网络。用ReLU解决梯度消失，用GPU加速，用Dropout防过拟合。第二名还是传统方法(26%)，它直接16%，碾压式胜利。',
     p:['ReLU解决梯度消失','Dropout防过拟合','GPU证明可行性'],
     c:['60M参数太大','3个FC层占绝大多数参数'],
     w:'每个深度学习课程的必讲架构。理解把网络做深做大就能赢的起点。'},
    {id:'vgg',nm:'VGG (2014)',
     f:'VGG16/VGG19, 138M参数, Top-5 error 7.3%',
     e:'核心创新：3个3\u00d73小核堆叠 = 1个7\u00d77大核的感受野，但参数更少（27C\u00b2 vs 49C\u00b2）。N个3\u00d73\u2192感受野=2N+1。公式简单有效。',

     c:['138M参数，太重了','3个FC层计算量大'],
     w:'理解小核堆叠的设计哲学。作为特征提取backbone仍然常用。'},
    {id:'goog',nm:'GoogLeNet / Inception (2014)',
     f:'22层, 仅4M参数(AlexNet 60M的1/15), Top-5 error 6.7%',
     e:'核心是Inception模块：1\u00d71、3\u00d73、5\u00d75卷积并联\u2192多尺度特征融合\u2192通道拼接。1\u00d71卷积先降维再算，省计算。淘汰FC层改用全局平均池化，参数从60M降到4M。',

    {id:'res',nm:'ResNet (2015)',

     e:'过拟合=背答案\u2014\u2014原题满分换新题不会。欠拟合=直线拟合正弦曲线\u2014\u2014模型太简单怎么学都不行。解决过拟合：增数据+正则化+早停+简化模型。解决欠拟合：加容量+减正则+更久训练。',
     w:'评估模型状态的基础诊断工具。'}
  ]}
];

// ============ RENDER ============
var catList = document.getElementById('catList');
var html = '';
for (var ci = 0; ci < D.length; ci++) {
  var cat = D[ci];
  html += '<div class=\"cat-item\">';
  html += '<div class=\"cat-header\" onclick=\"toggleCat('+ci+')\">';
  html += '<span>'+cat.i+' '+cat.n+'</span>';
  html += '<span class=\"count\">'+cat.ts.length+'</span></div>';
  html += '<div class=\"term-list\" id=\"cat-'+ci+'\">';
  for (var ti = 0; ti < cat.ts.length; ti++) {
    html += '<div class=\"term-item\" id=\"term-'+ci+'-'+ti+'\" onclick=\"showDetail('+ci+','+ti+')\">'+cat.ts[ti].nm+'</div>';
  }
  html += '</div></div>';
}
catList.innerHTML = html;

function toggleCat(ci) {
  var el = document.getElementById('cat-'+ci);
  if (!el) return;
  el.classList.toggle('open');
}

function showDetail(ci, ti) {
  var cat = D[ci];
  var term = cat.ts[ti];
  var items = document.querySelectorAll('.term-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var sel = document.getElementById('term-'+ci+'-'+ti);
  if (sel) sel.classList.add('active');
  var catEl = document.getElementById('cat-'+ci);
  if (catEl) catEl.classList.add('open');
  document.getElementById('detailTitle').textContent = term.nm;
  document.getElementById('breadcrumb').textContent = cat.n+' > '+term.nm;
  document.getElementById('welcome').style.display = 'none';
  var h = '<div class=\"term-detail active\" id=\"termDetail\">';
  h += '<div class=\"detail-title\">'+term.nm+'</div>';
  h += '<div class=\"detail-cat\">'+cat.i+' '+cat.n+'</div>';
  if (term.f) {
    h += '<div class=\"detail-section\"><h4><span class=\"icon\">\uD83D\uDCD0</span>公式 / 流程</h4><div class=\"formula-box\">'+term.f+'</div></div>';
  }
  if (term.e) {
    h += '<div class=\"detail-section\"><h4><span class=\"icon\">\uD83C\uDFAF</span>通俗例子</h4><div class=\"example-box\"><p>'+term.e+'</p></div></div>';
  }
  h += '<div class=\"pros-cons\">';
  if (term.p && term.p.length) {
    h += '<div class=\"pros-box\"><h5>'+'\u2705'+' 优点</h5>';
    for (var j = 0; j < term.p.length; j++) h += '<div class=\"item\">'+term.p[j]+'</div>';
    h += '</div>';
  }
  if (term.c && term.c.length) {
    h += '<div class=\"cons-box\"><h5>'+'\u274C'+' 缺点</h5>';
    for (var j = 0; j < term.c.length; j++) h += '<div class=\"item\">'+term.c[j]+'</div>';
    h += '</div>';
  }
  h += '</div>';
  if (term.w) {
    h += '<div class=\"detail-section\"><h4><span class=\"icon\">\uD83D\uDCCC</span>什么时候用</h4><div class=\"when-box\"><p>'+term.w+'</p></div></div>';
  }
  h += '</div>';
  document.getElementById('detailContainer').innerHTML = h;
  if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
}

function filterTerms() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var cats = document.querySelectorAll('.cat-item');
  for (var ci = 0; ci < cats.length; ci++) {
    var cat = cats[ci];
    var terms = cat.querySelectorAll('.term-item');
    var hasMatch = false;
    for (var ti = 0; ti < terms.length; ti++) {
      var match = terms[ti].textContent.toLowerCase().indexOf(q) !== -1;
      terms[ti].style.display = match ? 'block' : 'none';
      if (match) hasMatch = true;
    }
    var tl = cat.querySelector('.term-list');
    tl.style.display = q ? (hasMatch ? 'block' : 'none') : '';
    if (q) {
      if (hasMatch) tl.classList.add('open'); else tl.classList.remove('open');
    }
  }
}

toggleCat(0);
</script>
</body>
</html>
